<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌍 GeoQuiz – Multiplayer</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --text:#c9d1d9;--muted:#8b949e;--accent:#58a6ff;--gold:#f0c040;
  --green:#3fb950;--red:#f85149;--orange:#f78166;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);overflow:hidden}
a{color:inherit}
input,button{font-family:inherit}

/* ── SCREENS ── */
.screen{display:none;height:100vh;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}
#screen-game.active{align-items:stretch;justify-content:flex-start;overflow:hidden}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:1.75rem;width:100%;max-width:440px}
.card-title{font-size:1.75rem;font-weight:700;text-align:center;margin-bottom:.25rem}
.card-sub{color:var(--muted);text-align:center;font-size:.875rem;margin-bottom:1.75rem}

/* ── FORM ── */
.fg{margin-bottom:1rem}
.fg label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:.4rem;
  text-transform:uppercase;letter-spacing:.06em}
.fg input{width:100%;padding:.625rem .875rem;background:var(--surface2);
  border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:1rem;outline:none}
.fg input:focus{border-color:var(--accent)}
.divider{display:flex;align-items:center;gap:.75rem;color:var(--muted);
  font-size:.8rem;margin:1.25rem 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── BUTTONS ── */
.btn{display:flex;align-items:center;justify-content:center;gap:.5rem;width:100%;
  padding:.7rem;border:none;border-radius:8px;font-size:.95rem;font-weight:600;
  cursor:pointer;transition:opacity .15s,transform .1s}
.btn:hover:not(:disabled){opacity:.85}
.btn:active:not(:disabled){transform:scale(.98)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#0d1117}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-gold{background:var(--gold);color:#0d1117}
.btn-green{background:var(--green);color:#0d1117}
.btn+.btn{margin-top:.6rem}

/* ── LOBBY ── */
.room-code-box{background:var(--surface2);border:1px solid var(--border);border-radius:12px;
  padding:1rem;text-align:center;margin-bottom:1.25rem}
.rc-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.25rem}
.rc-value{font-size:2.75rem;font-weight:800;letter-spacing:.3em;color:var(--accent);font-family:monospace}
.rc-link{font-size:.72rem;color:var(--muted);word-break:break-all;margin-top:.5rem}
.rc-link a{color:var(--muted);text-decoration:underline}
.copy-btn{display:inline-block;margin-top:.4rem;font-size:.72rem;padding:.2rem .6rem;
  background:var(--surface);border:1px solid var(--border);border-radius:4px;
  cursor:pointer;color:var(--muted)}
.copy-btn:hover{color:var(--text)}
.section-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:.5rem}
.player-list{margin-bottom:1rem}
.player-item{display:flex;align-items:center;gap:.625rem;padding:.5rem 0;
  border-bottom:1px solid var(--border)}
.player-item:last-child{border-bottom:none}
.p-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.p-name{flex:1;font-size:.9rem}
.p-you{font-size:.72rem;color:var(--muted)}
.badge{font-size:.65rem;padding:.15rem .45rem;border-radius:4px;font-weight:600}
.badge-host{background:var(--gold);color:#000}
.badge-ready{background:var(--green);color:#000}
.lobby-hint{text-align:center;font-size:.8rem;color:var(--muted);margin-top:.5rem}

/* ── GAME SCREEN ── */
#question-bar{background:var(--surface);border-bottom:1px solid var(--border);
  padding:.625rem 1rem;flex-shrink:0;z-index:600}
.q-meta{display:flex;justify-content:space-between;align-items:center;
  margin-bottom:.2rem}
.q-progress{font-size:.72rem;color:var(--muted);font-weight:600;letter-spacing:.04em}
.q-timer{font-size:.72rem;color:var(--muted)}
.q-text{font-size:.975rem;font-weight:600;line-height:1.4}
#map-container{flex:1;position:relative;min-height:0}
#map{height:100%;width:100%}
#game-footer{background:var(--surface);border-top:1px solid var(--border);
  padding:.625rem 1rem;flex-shrink:0;z-index:600}
.players-bar{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:.5rem}
.pstat{display:flex;align-items:center;gap:.3rem;font-size:.78rem;padding:.15rem .4rem;
  border-radius:4px;background:var(--surface2);border:1px solid var(--border);transition:.2s}
.pstat.locked{border-color:var(--green)}
.pstat-dot{width:7px;height:7px;border-radius:50%}
.pstat-name{color:var(--muted)}
.pstat.locked .pstat-name{color:var(--text)}
.pstat-icon{font-size:.72rem}
.footer-row{display:flex;gap:.75rem;align-items:center}
#lock-btn{flex:1;padding:.6rem;background:var(--surface2);color:var(--muted);
  border:1px solid var(--border);border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer}
#lock-btn.ready{background:var(--accent);color:#0d1117;border-color:transparent}
#lock-btn.locked{background:var(--green);color:#0d1117;border-color:transparent;cursor:default}
#lock-btn:disabled{opacity:.4;cursor:not-allowed}

/* ── RESULTS SLIDE-UP ── */
#results-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:800;
  display:none;flex-direction:column;justify-content:flex-end;
  background:rgba(0,0,0,.65)}
#results-overlay.show{display:flex}
.results-sheet{background:var(--surface);border-radius:20px 20px 0 0;
  border-top:1px solid var(--border);padding:1.25rem;
  max-height:82vh;overflow-y:auto}
.res-title{font-size:1.1rem;font-weight:700;margin-bottom:.2rem}
.res-info{font-size:.8rem;color:var(--muted);margin-bottom:1rem;
  padding:.5rem .75rem;background:var(--surface2);border-radius:8px;
  border-left:3px solid var(--green)}
.result-item{display:flex;align-items:center;gap:.625rem;padding:.625rem 0;
  border-bottom:1px solid var(--border)}
.result-item:last-child{border-bottom:none}
.res-rank{font-size:1.2rem;width:2rem;text-align:center;flex-shrink:0}
.res-marker{width:24px;height:24px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:.65rem;font-weight:700;
  color:white;flex-shrink:0}
.res-info-col{flex:1;min-width:0}
.res-name{font-weight:600;font-size:.875rem}
.res-dist{font-size:.75rem;color:var(--muted)}
.res-pts{font-size:1rem;font-weight:700;color:var(--gold);flex-shrink:0}
.res-pts.zero{color:var(--muted)}
.ready-area{margin-top:1rem;border-top:1px solid var(--border);padding-top:1rem}
.ready-count{text-align:center;font-size:.78rem;color:var(--muted);margin-bottom:.5rem}

/* ── GAME OVER ── */
#screen-gameover.active{background:var(--bg)}
.go-card{background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:2rem;width:100%;max-width:420px}
.go-title{font-size:2rem;font-weight:700;text-align:center;margin-bottom:1.5rem}
.score-item{display:flex;align-items:center;gap:.875rem;
  padding:.75rem 0;border-bottom:1px solid var(--border)}
.score-item:last-child{border-bottom:none}
.sc-rank{font-size:1.4rem;width:2.25rem;text-align:center}
.sc-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.sc-name{flex:1;font-weight:600}
.sc-pts{font-size:1.1rem;font-weight:700;color:var(--gold)}

/* ── TOAST ── */
#toast{position:fixed;top:1rem;left:50%;transform:translateX(-50%);
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:.5rem 1rem;font-size:.825rem;
  z-index:9999;display:none;white-space:nowrap;pointer-events:none}

/* ── MAP CUSTOM ── */
.leaflet-container{background:#0d1520!important;font-family:inherit}
.leaflet-popup-content-wrapper{background:var(--surface);border:1px solid var(--border);
  color:var(--text);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.leaflet-popup-tip{background:var(--surface)}
.leaflet-popup-content{margin:.6rem .75rem;font-size:.825rem;line-height:1.5}
.leaflet-popup-close-button{color:var(--muted)!important}
.player-pin{width:28px;height:28px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:.65rem;font-weight:700;
  color:#fff;border:2.5px solid rgba(255,255,255,.5);
  box-shadow:0 2px 10px rgba(0,0,0,.5)}
.player-pin.me{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.25),0 2px 10px rgba(0,0,0,.5)}
.correct-pin{width:22px;height:22px;border-radius:50%;background:#ffd700;
  border:3px solid #fff;box-shadow:0 0 0 4px rgba(255,215,0,.35),0 2px 12px rgba(0,0,0,.5)}
.cap-dot{width:5px;height:5px;border-radius:50%;background:#ffd700;opacity:.65}
.cap-tooltip{background:var(--surface)!important;border:1px solid var(--border)!important;
  color:var(--text)!important;font-size:.75rem;padding:.25rem .5rem!important;border-radius:6px!important}
.cap-tooltip::before{display:none}

@media(max-width:480px){
  .card{padding:1.25rem;border-radius:0;max-width:100%;height:100vh;
    display:flex;flex-direction:column;justify-content:center}
  .rc-value{font-size:2.25rem}
  .q-text{font-size:.9rem}
}
</style>
</head>
<body>

<!-- ╔══════════════════════════════════╗ -->
<!-- ║       STARTSEITE                 ║ -->
<!-- ╚══════════════════════════════════╝ -->
<div id="screen-home" class="screen active">
  <div class="card">
    <div class="card-title">🌍 GeoQuiz</div>
    <div class="card-sub">Multiplayer · Wer kennt die Welt am besten?</div>

    <div class="fg">
      <label>Dein Name</label>
      <input type="text" id="inp-name" placeholder="z.B. Max" maxlength="18" autocomplete="off">
    </div>
    <button class="btn btn-primary" onclick="createRoom()">🏠 Neuen Raum erstellen</button>

    <div class="divider">oder beitreten</div>

    <div class="fg">
      <label>Raum-Code</label>
      <input type="text" id="inp-code" placeholder="z.B. ABC123" maxlength="6"
        style="text-transform:uppercase;letter-spacing:.1em;font-family:monospace;font-size:1.1rem"
        autocomplete="off" autocapitalize="characters">
    </div>
    <button class="btn btn-secondary" onclick="joinRoom()">🚪 Beitreten</button>
  </div>
</div>

<!-- ╔══════════════════════════════════╗ -->
<!-- ║       LOBBY                      ║ -->
<!-- ╚══════════════════════════════════╝ -->
<div id="screen-lobby" class="screen">
  <div class="card">
    <div class="room-code-box">
      <div class="rc-label">Raum-Code</div>
      <div class="rc-value" id="lobby-code">──────</div>
      <div class="rc-link">
        <a id="lobby-link-a" href="#">─</a>
        <br><button class="copy-btn" onclick="copyLink()">📋 Link kopieren</button>
      </div>
    </div>

    <div class="section-label">Spieler im Raum</div>
    <div class="player-list" id="lobby-players"></div>

    <button class="btn btn-primary" id="start-btn" onclick="startGame()" style="display:none">
      ▶ Spiel starten
    </button>
    <div class="lobby-hint" id="lobby-hint">Warte auf den Host...</div>
  </div>
</div>

<!-- ╔══════════════════════════════════╗ -->
<!-- ║       SPIELFELD                  ║ -->
<!-- ╚══════════════════════════════════╝ -->
<div id="screen-game" class="screen">
  <div id="question-bar">
    <div class="q-meta">
      <span class="q-progress" id="q-progress">Frage 1 / 10</span>
      <span class="q-timer" id="q-timer"></span>
    </div>
    <div class="q-text" id="q-text">Lade Frage …</div>
  </div>
  <div id="map-container">
    <div id="map"></div>
  </div>
  <div id="game-footer">
    <div class="players-bar" id="players-bar"></div>
    <div class="footer-row">
      <button id="lock-btn" onclick="lockAnswer()" disabled>
        📍 Klicke auf die Karte
      </button>
    </div>
  </div>
</div>

<!-- ╔══════════════════════════════════╗ -->
<!-- ║       ERGEBNIS-SHEET             ║ -->
<!-- ╚══════════════════════════════════╝ -->
<div id="results-overlay">
  <div class="results-sheet">
    <div class="res-title" id="res-title">Ergebnis</div>
    <div class="res-info" id="res-info"></div>
    <div id="res-list"></div>
    <div class="ready-area">
      <div class="ready-count" id="ready-count">Bereit: 0 / ?</div>
      <button class="btn btn-gold" id="ready-btn" onclick="readyNext()">✅ Weiter!</button>
    </div>
  </div>
</div>

<!-- ╔══════════════════════════════════╗ -->
<!-- ║       SPIELENDE                  ║ -->
<!-- ╚══════════════════════════════════╝ -->
<div id="screen-gameover" class="screen">
  <div class="go-card">
    <div class="go-title">🏆 Spielende!</div>
    <div id="go-scores"></div>
    <button class="btn btn-primary" style="margin-top:1.5rem" onclick="location.reload()">
      🔄 Neues Spiel
    </button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- ── SCRIPTS ── -->

let currentPhase = 'home', currentRoom = null;
let mapInited = false;

// ── KARTE ────────────────────────────────────────────────────────────────────
function ensureMap() {
  if (mapInited) { setTimeout(() => map.invalidateSize(), 80); return; }
  mapInited = true;

  map = L.map('map', {
    zoomControl: true, attributionControl: false,
    minZoom: 2, worldCopyJump: false,
    maxBounds: [[-90, -200], [90, 200]]
  }).setView([20, 10], 2);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 18, noWrap: false
  }).addTo(map);

  // Ländergrenzen
  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    .then(r => r.json())
    .then(world => {
      const countries = topojson.feature(world, world.objects.countries);
      L.geoJSON(countries, {
        style: { color: '#3a5f8a', weight: 0.7, fillColor: '#1a2d45', fillOpacity: 0.4 }
      }).addTo(map);
    }).catch(() => {});

  // Hauptstädte
  const capLayer = L.layerGroup().addTo(map);
  CAPITALS.forEach(([lat, lng, name, country]) => {
    L.circleMarker([lat, lng], {
      radius: 3, fillColor: '#f0c040', color: '#f0c040',
      weight: 1, fillOpacity: 0.8, opacity: 0.8
    }).bindTooltip(`<b>${name}</b><br><small>${country}</small>`,
      { direction: 'top', className: 'cap-tooltip' })
      .addTo(capLayer);
  });

  // Klick-Handler
  map.on('click', e => {
    if (currentPhase !== 'question' || isLocked) return;
    placePin(e.latlng.lat, e.latlng.lng);
  });

  setTimeout(() => map.invalidateSize(), 100);
}

function placePin(lat, lng) {
  myLatLng = { lat, lng };
  if (myMarker) map.removeLayer(myMarker);
  const initial = (document.getElementById('inp-name').value || '?').charAt(0).toUpperCase();
  const icon = L.divIcon({
    html: `<div class="player-pin me" style="background:${myColor()}">${initial}</div>`,
    className: '', iconSize: [28, 28], iconAnchor: [14, 14]
  });
  myMarker = L.marker([lat, lng], { icon, zIndexOffset: 500 }).addTo(map);
  const btn = document.getElementById('lock-btn');
  btn.className = 'ready';
  btn.textContent = '🔒 Antwort einloggen';
  btn.disabled = false;
}

function clearMarkers() {
  if (myMarker) { map.removeLayer(myMarker); myMarker = null; }
  resultMarkers.forEach(m => map.removeLayer(m));
  resultMarkers = [];
  if (correctMarker) { map.removeLayer(correctMarker); correctMarker = null; }
}

function myColor() { return colorMap[myId] || COLORS[0]; }

// ── SOCKET ───────────────────────────────────────────────────────────────────
function connectSocket() {
  socket = io();

  socket.on('room_created', ({ code }) => {
    currentRoom = code;
    showLobby(code);
  });

  socket.on('joined', ({ code }) => {
    currentRoom = code;
    showLobby(code);
  });

  socket.on('state', st => {
    if (st.myId) myId = st.myId;
    applyState(st);
  });

  socket.on('msg', text => toast(text));
  socket.on('err', msg => toast('❌ ' + msg, true));

  socket.on('new_question', ({ text, qIdx, totalQ }) => {
    currentPhase = 'question';
    isLocked = false;
    myLatLng = null;
    clearMarkers();

    document.getElementById('q-progress').textContent = `Frage ${qIdx + 1} / ${totalQ}`;
    document.getElementById('q-text').textContent = text;

    const btn = document.getElementById('lock-btn');
    btn.className = '';
    btn.textContent = '📍 Klicke auf die Karte';
    btn.disabled = true;

    document.getElementById('results-overlay').classList.remove('show');
    showScreen('screen-game');
    map.setView([20, 10], 2);
  });

  socket.on('player_locked', ({ playerId, name }) => {
    if (playerState[playerId]) playerState[playerId].locked = true;
    renderPlayersBar();
    if (playerId !== myId) toast(`${name} hat eingeloggt ✓`);
  });

  socket.on('round_results', ({ results, correct, scores, qIdx, totalQ }) => {
    currentPhase = 'results';

    // Richtiger Standort
    const cIcon = L.divIcon({
      html: '<div class="correct-pin"></div>',
      className: '', iconSize: [22, 22], iconAnchor: [11, 11]
    });
    correctMarker = L.marker([correct.lat, correct.lng], { icon: cIcon, zIndexOffset: 1000 })
      .bindPopup(`<b>✅ Richtige Antwort</b><br>${correct.info}`)
      .addTo(map);
    correctMarker.openPopup();

    // Spieler-Antworten
    const bounds = [[correct.lat, correct.lng]];
    results.forEach(r => {
      bounds.push([r.lat, r.lng]);
      const col = colorMap[r.id] || '#888';
      const ini = r.name.charAt(0).toUpperCase();
      const pIcon = L.divIcon({
        html: `<div class="player-pin" style="background:${col}">${ini}</div>`,
        className: '', iconSize: [28, 28], iconAnchor: [14, 14]
      });
      const m = L.marker([r.lat, r.lng], { icon: pIcon })
        .bindPopup(`<b>${r.name}</b><br>${Math.round(r.dist)} km entfernt · +${r.pts} Pkt`)
        .addTo(map);
      resultMarkers.push(m);

      const line = L.polyline([[r.lat, r.lng], [correct.lat, correct.lng]], {
        color: col, weight: 1.5, opacity: 0.5, dashArray: '5,5'
      }).addTo(map);
      resultMarkers.push(line);
    });

    if (bounds.length) map.fitBounds(bounds, { padding: [55, 55], maxZoom: 10 });
    showResults(results, correct, scores, qIdx, totalQ);
  });

  socket.on('ready_update', ({ count, total }) => {
    document.getElementById('ready-count').textContent = `Bereit: ${count} / ${total}`;
  });

  socket.on('game_over', ({ scores }) => {
    document.getElementById('results-overlay').classList.remove('show');
    showGameOver(scores);
  });
}

// ── STATE MANAGEMENT ─────────────────────────────────────────────────────────
function applyState(st) {
  // Farben zuweisen
  st.players.forEach((p, i) => {
    if (!colorMap[p.id]) colorMap[p.id] = COLORS[Object.keys(colorMap).length % COLORS.length];
    playerState[p.id] = { ...p, color: colorMap[p.id] };
  });

  if (st.phase === 'lobby') {
    renderLobbyPlayers(st.players, st.hostId);
    const isHost = st.hostId === myId;
    document.getElementById('start-btn').style.display = isHost ? 'block' : 'none';
    document.getElementById('lobby-hint').style.display = isHost ? 'none' : 'block';
  }

  if (currentPhase === 'question') renderPlayersBar();
}

// ── UI ───────────────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'screen-game') {
    setTimeout(() => { ensureMap(); }, 60);
  }
}

function showLobby(code) {
  const url = `${location.origin}?r=${code}`;
  document.getElementById('lobby-code').textContent = code;
  document.getElementById('lobby-link-a').href = url;
  document.getElementById('lobby-link-a').textContent = url;
  showScreen('screen-lobby');
}

function copyLink() {
  const url = `${location.origin}?r=${currentRoom}`;
  navigator.clipboard.writeText(url).then(() => toast('📋 Link kopiert!')).catch(() => {});
}

function renderLobbyPlayers(players, hostId) {
  const list = document.getElementById('lobby-players');
  list.innerHTML = players.map(p => {
    const col = colorMap[p.id] || '#888';
    const isMe = p.id === myId;
    const isHost = p.id === hostId;
    return `<div class="player-item">
      <div class="p-dot" style="background:${col}"></div>
      <span class="p-name">${p.name}${isMe ? ' <span class="p-you">(du)</span>' : ''}</span>
      ${isHost ? '<span class="badge badge-host">HOST</span>' : ''}
      <span style="color:var(--muted);font-size:.8rem">${p.score} Pkt</span>
    </div>`;
  }).join('');
}

function renderPlayersBar() {
  const bar = document.getElementById('players-bar');
  if (!bar) return;
  bar.innerHTML = Object.values(playerState).map(p =>
    `<div class="pstat ${p.locked ? 'locked' : ''}">
      <div class="pstat-dot" style="background:${p.color}"></div>
      <span class="pstat-name">${p.name}</span>
      <span class="pstat-icon">${p.locked ? '✓' : '○'}</span>
    </div>`
  ).join('');
}

function showResults(results, correct, scores, qIdx, totalQ) {
  document.getElementById('res-title').textContent = `Runde ${qIdx + 1} / ${totalQ} · Ergebnis`;
  document.getElementById('res-info').textContent = `📍 ${correct.info}`;

  const ranks = ['🥇', '🥈', '🥉'];
  const totalPlayers = Object.keys(playerState).length;
  document.getElementById('res-list').innerHTML = results.map((r, i) => {
    const col = colorMap[r.id] || '#888';
    const ini = r.name.charAt(0).toUpperCase();
    const sc = scores.find(s => s.id === r.id);
    return `<div class="result-item">
      <div class="res-rank">${ranks[i] || ''}</div>
      <div class="res-marker" style="background:${col}">${ini}</div>
      <div class="res-info-col">
        <div class="res-name">${r.name}${r.id === myId ? ' <small style="color:var(--muted)">(du)</small>' : ''}</div>
        <div class="res-dist">${Math.round(r.dist)} km entfernt · Gesamt: ${sc ? sc.score : 0} Pkt</div>
      </div>
      <div class="res-pts ${r.pts === 0 ? 'zero' : ''}">+${r.pts}</div>
    </div>`;
  }).join('');

  document.getElementById('ready-count').textContent = `Bereit: 0 / ${results.length}`;
  document.getElementById('ready-btn').disabled = false;
  document.getElementById('ready-btn').textContent = '✅ Weiter!';
  document.getElementById('results-overlay').classList.add('show');
}

function showGameOver(scores) {
  const ranks = ['🥇', '🥈', '🥉'];
  document.getElementById('go-scores').innerHTML = scores.map((s, i) => {
    const col = colorMap[s.id] || '#888';
    return `<div class="score-item">
      <div class="sc-rank">${ranks[i] || ''}</div>
      <div class="sc-dot" style="background:${col}"></div>
      <div class="sc-name">${s.name}${s.id === myId ? ' <small style="color:var(--muted)">(du)</small>' : ''}</div>
      <div class="sc-pts">${s.score} Pkt</div>
    </div>`;
  }).join('');
  showScreen('screen-gameover');
}

let toastTimer;
function toast(msg, isErr = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.borderColor = isErr ? 'var(--red)' : 'var(--border)';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.style.display = 'none', 2800);
}

// ── AKTIONEN ─────────────────────────────────────────────────────────────────
function createRoom() {
  const name = document.getElementById('inp-name').value.trim();
  if (!name) { toast('❌ Bitte gib deinen Namen ein', true); return; }
  if (!socket) connectSocket();
  socket.emit('create_room', { name });
}

function joinRoom() {
  const name = document.getElementById('inp-name').value.trim();
  const code = document.getElementById('inp-code').value.trim().toUpperCase();
  if (!name) { toast('❌ Bitte gib deinen Namen ein', true); return; }
  if (code.length < 4) { toast('❌ Bitte gib einen gültigen Code ein', true); return; }
  if (!socket) connectSocket();
  socket.emit('join_room', { code, name });
}

function startGame() {
  socket.emit('start_game');
}

function lockAnswer() {
  if (!myLatLng || isLocked) return;
  isLocked = true;
  socket.emit('lock_answer', myLatLng);
  const btn = document.getElementById('lock-btn');
  btn.className = 'locked';
  btn.textContent = '✅ Eingeloggt – warte auf andere …';
  btn.disabled = true;
}

function readyNext() {
  const btn = document.getElementById('ready-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Warte …';
  socket.emit('ready_next');
}

// ── INITIALISIERUNG ──────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  // Raum-Code aus URL auslesen
  const params = new URLSearchParams(location.search);
  const roomCode = params.get('r');
  if (roomCode) {
    document.getElementById('inp-code').value = roomCode.toUpperCase();
    document.getElementById('inp-name').focus();
    toast(`🔗 Tritt Raum ${roomCode.toUpperCase()} bei – gib deinen Namen ein!`);
  }

  // Socket sofort verbinden
  connectSocket();

  // Enter-Taste in Name-/Code-Feldern
  document.getElementById('inp-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const code = document.getElementById('inp-code').value.trim();
      code ? joinRoom() : createRoom();
    }
  });
  document.getElementById('inp-code').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinRoom();
  });
  document.getElementById('inp-code').addEventListener('input', e => {
    e.target.value = e.target.value.toUpperCase();
  });
});
</script>
